name: Fetch ProofHub Tasks

on:
  workflow_dispatch:   # manual trigger only

jobs:
  fetch-tasks:
    runs-on: ubuntu-latest
    timeout-minutes: 120    # 609 projects may take a while

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          PROOFHUB_API_KEY:  ${{ secrets.PROOFHUB_API_KEY }}
          PROOFHUB_COMPANY:  srvmedia
        run: python fetch_proofhub_tasks.py

      - name: Commit output CSV to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/proofhub_all_tasks.csv output/proofhub_all_tasks.json
          git diff --cached --quiet || git commit -m "chore: update ProofHub tasks export [$(date +'%Y-%m-%d %H:%M')]"
          git push
